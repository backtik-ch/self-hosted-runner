name: Build and Push Docker Image to GHCR

on:
  push:
    branches:
      - 'main'
      
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN_VINCENT }}

      # 3️⃣ Get sanitized branch name for Docker tag
      - name: Set branch variable for PR
        id: vars
        run: |
          # Use GITHUB_HEAD_REF if it exists (PR), otherwise fallback to GITHUB_REF
          if [ -n "$GITHUB_HEAD_REF" ]; then
            BRANCH_NAME=$GITHUB_HEAD_REF
          else
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
          fi

          # Replace / with - to make it Docker tag safe
          BRANCH_NAME=${BRANCH_NAME//\//-}

          echo "branch=${BRANCH_NAME}" >> $GITHUB_OUTPUT

      # 4️⃣ Build the Docker image
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:main ./docker/Dockerfile
      # 5️⃣ Push the Docker image
      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:main
