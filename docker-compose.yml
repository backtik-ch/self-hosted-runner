services:
  runner:
    image: ghcr.io/backtik-ch/self-hosted-runner:main
    restart: always
    env_file:
      - .env
    secrets:
      - github_runner_pat
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    stop_grace_period: 2m
    deploy:
      mode: replicated
      replicas: 5
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
        monitor: 2m
        max_failure_ratio: 0
      rollback_config:
        parallelism: 1
        delay: 30s
        order: stop-first
        failure_action: pause
        monitor: 2m
        max_failure_ratio: 0
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.4'
          memory: 256M

secrets:
  github_runner_pat:
    external: true
