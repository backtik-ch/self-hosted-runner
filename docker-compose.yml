services:
  runner:
    image: backtik-ch/self-hosted-runner:main
    restart: always
    env_file:
      - .env
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.4'
          memory: 256M
