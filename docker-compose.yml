services:
  runner:
    image: ghcr.io/backtik-ch/self-hosted-runner:main
    restart: always
    env_file:
      - .env
    secrets:
      - github_runner_pat
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    deploy:
      mode: replicated
      replicas: 5
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.4'
          memory: 256M

secrets:
  github_runner_pat:
    external: true
